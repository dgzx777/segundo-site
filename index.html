<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guia Visual de Redes para Automação</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f6f9;
}

header{
    background:#1565c0;
    color:white;
    padding:20px;
    text-align:center;
}

.tabs{
    display:flex;
    justify-content:center;
    background:#0d47a1;
}

.tab{
    padding:15px 30px;
    color:white;
    cursor:pointer;
    transition:.3s;
}

.tab:hover,
.tab.active{
    background:#1976d2;
}

.content{
    display:none;
    padding:30px;
}

.content.active{
    display:block;
}

.cards{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    justify-content:center;
    margin-top:20px;
}

.card{
    width:220px;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    cursor:pointer;
    text-align:center;
    transition:.3s;
}

.card:hover{
    transform:scale(1.05);
    background:#e3f2fd;
}

.info{
    margin-top:25px;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
}

.buttons{
    display:flex;
    gap:20px;
    justify-content:center;
    margin-top:20px;
    flex-wrap:wrap;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:8px;
    background:#1565c0;
    color:white;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#0d47a1;
}

ul{
    margin-left:20px;
    margin-top:10px;
}

h3{
    margin-bottom:10px;
}
</style>
</head>

<body>

<header>
    <h1>Guia Visual de Redes para Automação</h1>
</header>

<div class="tabs">
    <div class="tab active" onclick="abrirAba('cabos', this)">
        Cabos Industriais
    </div>

    <div class="tab" onclick="abrirAba('topologias', this)">
        Topologias
    </div>
</div>

<!-- ABA 1 -->

<div id="cabos" class="content active">

    <h2>Cabos Industriais</h2>

    <div class="cards">

        <div class="card" onclick="mostrarCabo('par')">
            <h3>Par Trançado</h3>
        </div>

        <div class="card" onclick="mostrarCabo('fibra')">
            <h3>Fibra Óptica</h3>
        </div>

        <div class="card" onclick="mostrarCabo('wireless')">
            <h3>Wireless</h3>
        </div>

    </div>

    <div class="info" id="infoCabos">
        Clique em um dos cards para ver a explicação.
    </div>

</div>

<!-- ABA 2 -->

<div id="topologias" class="content">

    <h2>Topologias</h2>

    <div class="buttons">
        <button onclick="mostrarTopo('estrela')">
            Layout em Estrela
        </button>

        <button onclick="mostrarTopo('barramento')">
            Layout em Barramento
        </button>
    </div>

    <div class="info" id="infoTopo">
        Escolha um layout para visualizar as informações.
    </div>

</div>

<script>

function abrirAba(id, elemento){

    let abas=document.querySelectorAll(".content");
    abas.forEach(a=>a.classList.remove("active"));

    document.getElementById(id).classList.add("active");

    let botoes=document.querySelectorAll(".tab");
    botoes.forEach(b=>b.classList.remove("active"));

    elemento.classList.add("active");
}

function mostrarCabo(tipo){

    let texto="";

    if(tipo==="par"){
        texto="<h3>Par Trançado</h3><p>É usado para ligar CLPs, IHMs, sensores e computadores dentro da fábrica. É comum em redes Ethernet industriais.</p>";
    }

    if(tipo==="fibra"){
        texto="<h3>Fibra Óptica</h3><p>É usada para conectar áreas mais distantes da fábrica e locais com muita interferência elétrica.</p>";
    }

    if(tipo==="wireless"){
        texto="<h3>Wireless</h3><p>É usado para conectar tablets, coletores de dados, AGVs e equipamentos móveis sem precisar de cabos.</p>";
    }

    document.getElementById("infoCabos").innerHTML=texto;

}

function mostrarTopo(tipo){

    let texto="";

    if(tipo==="estrela"){

        texto=`
        <h3>Layout em Estrela</h3>

        <p>Todos os equipamentos são ligados a um ponto central, como um switch.</p>

        <h4>Vantagens</h4>
        <ul>
            <li>Fácil de encontrar falhas.</li>
            <li>Boa organização.</li>
            <li>Se um cabo falhar, os outros continuam funcionando.</li>
        </ul>

        <h4>Desvantagens</h4>
        <ul>
            <li>Usa mais cabos.</li>
            <li>Depende do switch central.</li>
        </ul>
        `;
    }

    if(tipo==="barramento"){

        texto=`
        <h3>Layout em Barramento</h3>

        <p>Todos os equipamentos compartilham o mesmo cabo principal.</p>

        <h4>Vantagens</h4>
        <ul>
            <li>Menor quantidade de cabos.</li>
            <li>Instalação simples.</li>
        </ul>

        <h4>Desvantagens</h4>
        <ul>
            <li>Se o cabo principal falhar, toda a rede pode parar.</li>
            <li>É mais difícil localizar problemas.</li>
        </ul>
        `;
    }

    document.getElementById("infoTopo").innerHTML=texto;

}

</script>

</body>
</html>
